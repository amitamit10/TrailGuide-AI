name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nextjs:
    name: Next.js — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  go-backend:
    name: Go backend — vet + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum
      - working-directory: backend
        run: go mod download
      - working-directory: backend
        run: go vet ./...
      - working-directory: backend
        run: go build ./...

  python-ai:
    name: Python AI service — lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: ai-service
        run: pip install -r requirements.txt
      - working-directory: ai-service
        run: python -c "import main"
      - working-directory: ai-service
        run: |
          pip install ruff
          ruff check . --select E,F --ignore E501

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [go-backend, python-ai]
    steps:
      - uses: actions/checkout@v4
      - name: Build Go backend image
        run: docker build -t trailguide-backend ./backend
      - name: Build Python AI image
        run: docker build -t trailguide-ai ./ai-service
